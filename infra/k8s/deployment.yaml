apiVersion: apps/v1
kind: Deployment
metadata:
  name: uvse-web
  namespace: uvse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uvse-web
  template:
    metadata:
      labels:
        app: uvse-web
    spec:
      containers:
        - name: uvse-web
          image: ghcr.io/example/uvse-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: uvse-config
            - secretRef:
                name: uvse-secrets
          volumeMounts:
            - name: dataprotection-keys
              mountPath: /var/uvse/dataprotection
              readOnly: false
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        - name: dataprotection-keys
          persistentVolumeClaim:
            claimName: uvse-dataprotection
