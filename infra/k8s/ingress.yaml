apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uvse-web
  namespace: uvse
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - uvse.example.com
      secretName: uvse-web-tls
  rules:
    - host: uvse.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uvse-web
                port:
                  number: 80
