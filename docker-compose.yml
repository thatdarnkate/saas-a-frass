version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: uvse
      POSTGRES_USER: uvse
      POSTGRES_PASSWORD: uvse
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres-data:
